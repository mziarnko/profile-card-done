<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
 <div class="flex-card-container">
     <div class="card-flex">
        <div class="header">      
            <img src="./img/bg-pattern-card.svg" alt="">      
        </div>
        
        <div class="user-data">
            <img src="./img/image-victor.jpg" alt="victor" class="user-image">
            <h1>Victor Crest <span class="user-age">26</span></h1>
            <h2 class="city">London </h2>
        </div>
        <div class="footer">
            <div class="item">
                <h3>80K</h3>
                <h4>Followers</h4>
            </div>
            <div class="item">
                <h3>803K</h3>
                <h4>Likes</h4>
            </div>
            <div class="item">
                <h3>1.4K</h3>
                <h4>Photos</h4>
            </div>
        </div>
    </div>
</div>
</body>
</html>
